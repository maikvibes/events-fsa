# External Kafka (port 9094) -> kafka:29094
# SASL_SSL listener: the broker enforces SCRAM-SHA-256 on top of TLS.
# nginx does not inspect the traffic (pure TCP pass-through).
upstream kafka_external_backend {
    server kafka:29094 max_fails=3 fail_timeout=10s;
}

server {
    listen 9094;
    proxy_pass kafka_external_backend;
    proxy_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_buffer_size 16k;
}
