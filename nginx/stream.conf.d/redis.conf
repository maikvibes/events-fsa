# Redis (port 6380) -> redis:6379
# Pure TCP pass-through: the redis server itself does TLS on this listener.
# nginx does not inspect the traffic.
upstream redis_backend {
    server redis:6379 max_fails=3 fail_timeout=10s;
}

server {
    listen 6380;
    proxy_pass redis_backend;
    proxy_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_buffer_size 16k;
}
