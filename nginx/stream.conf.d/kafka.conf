# Kafka (port 9093) -> kafka:29093
# Pure TCP pass-through: the kafka broker does TLS itself on the SSL
# listener. nginx does not inspect the traffic.
upstream kafka_backend {
    server kafka:29093 max_fails=3 fail_timeout=10s;
}

server {
    listen 9093;
    proxy_pass kafka_backend;
    proxy_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_buffer_size 16k;
}
