# PostgreSQL (port 5433) -> postgres:5432
# Pure TCP pass-through: the postgres server itself does TLS + scram-sha-256
# on this listener. nginx does not inspect the traffic. This avoids the
# SSLRequest protocol mismatch that happens when nginx terminates TLS and
# the inner hop has ssl=off.
upstream postgres_backend {
    server postgres:5432 max_fails=3 fail_timeout=10s;
}

server {
    listen 5433;
    proxy_pass postgres_backend;
    proxy_timeout 300s;
    proxy_connect_timeout 10s;
    proxy_buffer_size 16k;
}
