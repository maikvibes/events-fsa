user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

# Stream block: TCP/UDP reverse proxy. Required because postgres, kafka, and
# redis are not HTTP. We terminate TLS here for postgres and redis, and pass
# encrypted bytes through for kafka (kafka handles its own TLS+SASL).
stream {
    log_format stream_main '$remote_addr [$time_local] '
                           'protocol=$stream_protocol '
                           'upstream=$upstream_addr '
                           'status=$status '
                           'session_time=$session_time '
                           'bytes_in=$upstream_bytes_received '
                           'bytes_out=$upstream_bytes_sent';

    access_log /var/log/nginx/stream-access.log stream_main;

    # Shared connection state
    map $ssl_preread_protocol $upstream_proto {
        default tcp;
    }

    # Mutual TLS is opt-in per service block.
    include /etc/nginx/conf.d/tls.conf;
    include /etc/nginx/stream.conf.d/*.conf;
}
