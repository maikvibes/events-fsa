name: events-fsa-infra

# Infrastructure-only compose: postgres + zookeeper + kafka + redis.
# Host-system nginx (managed by systemd) is the only entry point: see
# INFRA.md. No host ports are published here.

x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_SUPERUSER}
  POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
  POSTGRES_DB: ${POSTGRES_SUPERUSER_DB}
  POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C --auth=scram-sha-256"

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    <<: *restart
    user: "0:0"   # Entrypoint chowns PGDATA and execs as the postgres user.
    expose:
      - "5432"
    environment:
      <<: *postgres-env
      POSTGRES_AUTH_USER: ${POSTGRES_AUTH_USER}
      POSTGRES_AUTH_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
      POSTGRES_EVENTS_USER: ${POSTGRES_EVENTS_USER}
      POSTGRES_EVENTS_PASSWORD: ${POSTGRES_EVENTS_PASSWORD}
      POSTGRES_NOTIFICATIONS_USER: ${POSTGRES_NOTIFICATIONS_USER}
      POSTGRES_NOTIFICATIONS_PASSWORD: ${POSTGRES_NOTIFICATIONS_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-dbs.sql:/docker-entrypoint-initdb.d/00-init-dbs.sql:ro
      - ./scripts/init-roles.sh:/docker-entrypoint-initdb.d/10-init-roles.sh:ro
      - /etc/ssl/events-fsa/postgres.crt:/etc/ssl/events-fsa/postgres.crt:ro
      - /etc/ssl/events-fsa/postgres.key:/etc/ssl/events-fsa/postgres.key:ro
      - /etc/ssl/events-fsa/ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    command:
      - "postgres"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/etc/ssl/events-fsa/postgres.crt"
      - "-c"
      - "ssl_key_file=/etc/ssl/events-fsa/postgres.key"
      - "-c"
      - "ssl_ca_file=/etc/ssl/events-fsa/ca.crt"
      - "-c"
      - "password_encryption=scram-sha-256"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "shared_preload_libraries=passwordcheck"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER} -d ${POSTGRES_SUPERUSER_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    security_opt:
      - "no-new-privileges:true"
    read_only: false
    networks:
      backend:
        ipv4_address: 172.30.0.10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    <<: *restart
    user: "0:0"
    expose:
      - "2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 10
      ZOOKEEPER_SYNC_LIMIT: 5
      ZOOKEEPER_AUTOPURGE_INTERVAL: 24
      ZOOKEEPER_AUTOPURGE_RETAIN_COUNT: 5
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
      # Enable the healthcheck four-letter-word "ruok". Default in 3.5+ is none.
      # Passed as a JVM system property because the confluent template does not
      # forward ZOOKEEPER_4LW_COMMANDS_WHITELIST to zookeeper.properties.
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    security_opt:
      - "no-new-privileges:true"
    networks:
      backend:
        ipv4_address: 172.30.0.13

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    <<: *restart
    user: "0:0"   # The Confluent image does not chown its data volume; run as root.
    depends_on:
      zookeeper:
        condition: service_healthy
    expose:
      - "29092"   # PLAINTEXT (inter-broker / controller)
      - "29093"   # SSL (in-cluster apps via docker network)
      - "29094"   # SASL_SSL (external clients via nginx)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Three listeners:
      #   PLAINTEXT  – inter-broker / controller (in-cluster, no TLS)
      #   SSL        – in-cluster app services connecting directly (TLS, no SASL)
      #   EXTERNAL   – internet clients via host nginx (SASL_SSL, SCRAM-SHA-256)
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,SSL://kafka:29093,EXTERNAL://0.0.0.0:29094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,SSL://kafka:29093,EXTERNAL://${KAFKA_EXTERNAL_HOSTNAME:-nginx.maik.io.vn}:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,SSL:SSL,EXTERNAL:SASL_SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256
      KAFKA_SSL_ENABLED_PROTOCOLS: TLSv1.2
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      KAFKA_SSL_KEYSTORE_TYPE: JKS
      KAFKA_SSL_TRUSTSTORE_TYPE: JKS
      KAFKA_SSL_PROTOCOL: TLSv1.2
      KAFKA_SSL_CLIENT_AUTH: none
      KAFKA_SSL_KEYSTORE_FILENAME: kafka.server.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: kafka_keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: kafka_key_creds
      KAFKA_SSL_TRUSTSTORE_FILENAME: kafka.server.truststore.jks
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: kafka_truststore_creds
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      # Read by scripts/kafka-init.sh
      KAFKA_ADMIN_USER: ${KAFKA_ADMIN_USER}
      KAFKA_ADMIN_PASSWORD: ${KAFKA_ADMIN_PASSWORD}
      KAFKA_APP_USER: ${KAFKA_APP_USER}
      KAFKA_APP_PASSWORD: ${KAFKA_APP_PASSWORD}
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./secrets/kafka/server.keystore.jks:/etc/kafka/secrets/kafka.server.keystore.jks:ro
      - ./secrets/kafka/server.truststore.jks:/etc/kafka/secrets/kafka.server.truststore.jks:ro
      - ./secrets/kafka/keystore_creds:/etc/kafka/secrets/kafka_keystore_creds:ro
      - ./secrets/kafka/key_creds:/etc/kafka/secrets/kafka_key_creds:ro
      - ./secrets/kafka/truststore_creds:/etc/kafka/secrets/kafka_truststore_creds:ro
      - ./scripts/kafka-init.sh:/usr/local/bin/kafka-init.sh:ro
    command: ["bash", "-c", "/usr/local/bin/kafka-init.sh"]
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:29092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    security_opt:
      - "no-new-privileges:true"
    networks:
      backend:
        ipv4_address: 172.30.0.11

  redis:
    image: redis:7-alpine
    <<: *restart
    user: "0:0"   # Entrypoint chowns /data and execs redis-server as the redis user.
    expose:
      - "6379"
    command:
      - "redis-server"
      - "/usr/local/etc/redis/redis.conf"
    volumes:
      - redis_data:/data
      - ./scripts/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./scripts/redis-acl.conf:/usr/local/etc/redis/users.acl:ro
      - /etc/ssl/events-fsa/redis.crt:/etc/ssl/events-fsa/redis.crt:ro
      - /etc/ssl/events-fsa/redis.key:/etc/ssl/events-fsa/redis.key:ro
      - /etc/ssl/events-fsa/ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "redis-cli --tls --cacert /etc/ssl/events-fsa/ca.crt --user $$REDIS_HEALTH_USER --pass $$REDIS_HEALTH_PASSWORD --no-auth-warning PING | grep -q PONG"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    environment:
      REDIS_HEALTH_USER: ${REDIS_HEALTH_USER}
      REDIS_HEALTH_PASSWORD: ${REDIS_HEALTH_PASSWORD}
    security_opt:
      - "no-new-privileges:true"
    networks:
      backend:
        ipv4_address: 172.30.0.12

networks:
  # Internal: no egress to the host or the internet. Host-system nginx reaches
  # the services by their fixed IPs below.
  backend:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  postgres_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  redis_data:
