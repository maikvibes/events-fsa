x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_SUPERUSER}
  POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
  POSTGRES_DB: ${POSTGRES_SUPERUSER_DB}
  POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C --auth=scram-sha-256"

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    <<: *restart
    user: "0:0"
    expose:
      - "5432"
    ports:
      - "5432:5432"
    environment:
      <<: *postgres-env
      POSTGRES_AUTH_USER: ${POSTGRES_AUTH_USER}
      POSTGRES_AUTH_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
      POSTGRES_EVENTS_USER: ${POSTGRES_EVENTS_USER}
      POSTGRES_EVENTS_PASSWORD: ${POSTGRES_EVENTS_PASSWORD}
      POSTGRES_NOTIFICATIONS_USER: ${POSTGRES_NOTIFICATIONS_USER}
      POSTGRES_NOTIFICATIONS_PASSWORD: ${POSTGRES_NOTIFICATIONS_PASSWORD}
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-dbs.sql:/docker-entrypoint-initdb.d/00-init-dbs.sql:ro
      - ./scripts/init-roles.sh:/docker-entrypoint-initdb.d/10-init-roles.sh:ro
      - ./nginx/certs/postgres.crt:/etc/ssl/events-fsa/postgres.crt:ro
      - ./nginx/certs/postgres.key:/etc/ssl/events-fsa/postgres.key:ro
      - ./ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    entrypoint:
      - sh
      - -c
      - |
        cp /etc/ssl/events-fsa/postgres.key /tmp/postgres.key
        chown postgres:postgres /tmp/postgres.key
        chmod 600 /tmp/postgres.key
        exec docker-entrypoint.sh "$$@"
      - sh
    command:
      - "postgres"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/etc/ssl/events-fsa/postgres.crt"
      - "-c"
      - "ssl_key_file=/tmp/postgres.key"
      - "-c"
      - "ssl_ca_file=/etc/ssl/events-fsa/ca.crt"
      - "-c"
      - "password_encryption=scram-sha-256"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "shared_preload_libraries=passwordcheck"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    security_opt:
      - "no-new-privileges:true"
    networks:
      backend:
        ipv4_address: 172.30.0.10

  kafka:
    image: apache/kafka:latest
    <<: *restart
    user: "0:0"
    expose:
      - "29092" # PLAINTEXT (inter-broker)
      - "29093" # SSL (in-cluster apps via docker network)
      - "29094" # SASL_SSL (external clients via nginx)
      - "29095" # CONTROLLER (KRaft Raft)
    ports:
      - "29094:29094"
    environment:
      # KRaft: this node is both broker and controller (single-node combined mode)
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-QTk1NjcxYjhkZTVkNGU2M}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29095
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Log data directory (override the image default of /tmp/kraft-combined-logs)
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # Three listeners:
      #   PLAINTEXT  – inter-broker / controller (in-cluster, no TLS)
      #   SSL        – in-cluster app services connecting directly (TLS, no SASL)
      #   EXTERNAL   – internet clients via host nginx (SASL_SSL, SCRAM-SHA-256)
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,SSL://kafka:29093,EXTERNAL://0.0.0.0:29094,CONTROLLER://kafka:29095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,SSL://kafka:29093,EXTERNAL://localhost:29094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,SSL:SSL,EXTERNAL:SASL_SSL,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256
      KAFKA_SSL_ENABLED_PROTOCOLS: TLSv1.2,TLSv1.3
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      KAFKA_SSL_KEYSTORE_TYPE: JKS
      KAFKA_SSL_TRUSTSTORE_TYPE: JKS
      KAFKA_SSL_PROTOCOL: TLSv1.3
      KAFKA_SSL_CLIENT_AUTH: none
      KAFKA_SSL_KEYSTORE_FILENAME: kafka.server.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: kafka_keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: kafka_key_creds
      KAFKA_SSL_TRUSTSTORE_FILENAME: kafka.server.truststore.jks
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: kafka_truststore_creds
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      # KAFKA_OPTS (JAAS config for SASL) is set dynamically by kafka-init.sh
      # SASL credentials — used by kafka-init.sh when re-enabling SCRAM users
      KAFKA_ADMIN_USER: ${KAFKA_ADMIN_USER}
      KAFKA_ADMIN_PASSWORD: ${KAFKA_ADMIN_PASSWORD}
      KAFKA_APP_USER: ${KAFKA_APP_USER}
      KAFKA_APP_PASSWORD: ${KAFKA_APP_PASSWORD}
    volumes:
      - kafka_kraft_data:/var/lib/kafka/data
      - ./secrets/kafka/server.keystore.jks:/etc/kafka/secrets/kafka.server.keystore.jks:ro
      - ./secrets/kafka/server.truststore.jks:/etc/kafka/secrets/kafka.server.truststore.jks:ro
      - ./secrets/kafka/keystore_creds:/etc/kafka/secrets/kafka_keystore_creds:ro
      - ./secrets/kafka/key_creds:/etc/kafka/secrets/kafka_key_creds:ro
      - ./secrets/kafka/truststore_creds:/etc/kafka/secrets/kafka_truststore_creds:ro
      - ./scripts/kafka-init.sh:/usr/local/bin/kafka-init.sh:ro
    command: ["bash", "-c", "/usr/local/bin/kafka-init.sh"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/kafka/29092' 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 60s
    security_opt:
      - "no-new-privileges:true"
    networks:
      backend:
        ipv4_address: 172.30.0.11

  redis:
    image: redis:7-alpine
    <<: *restart
    user: "0:0"
    expose:
      - "6379"
    ports:
      - "6380:6379"
    command:
      - "redis-server"
      - "/usr/local/etc/redis/redis.conf"
    env_file: .env
    volumes:
      - redis_data:/data
      - ./scripts/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./scripts/redis-acl.conf:/usr/local/etc/redis/users.acl:ro
      - ./nginx/certs/redis.crt:/etc/ssl/events-fsa/redis.crt:ro
      - ./nginx/certs/redis.key:/etc/ssl/events-fsa/redis.key:ro
      - ./ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    healthcheck:
      test:
        - "CMD-SHELL"
        - "redis-cli -h 127.0.0.1 -p 6379 --tls --cacert /etc/ssl/events-fsa/ca.crt --user $$REDIS_HEALTH_USER --pass $$REDIS_HEALTH_PASSWORD --no-auth-warning PING"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    security_opt:
      - "no-new-privileges:true"
    networks:
      backend:
        ipv4_address: 172.30.0.12

  # ==========================================
  # Frontend Service
  # ==========================================
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: devops_apigateway_dev
    ports:
      - "3001:${PORT:-3000}"
    env_file: .env
    environment:
      - NODE_ENV=development
      - KAFKA_BROKER=kafka:29093
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - path: ./apps/api-gateway
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth
    container_name: devops_auth_dev
    env_file: .env
    environment:
      - NODE_ENV=development
      - KAFKA_BROKER=kafka:29093
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUTH_DATABASE_URL=postgresql://${POSTGRES_AUTH_USER}:${POSTGRES_AUTH_PASSWORD}@postgres:5432/auth_db?schema=public
    volumes:
      - ./ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - path: ./apps/auth
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  events:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: events
    container_name: devops_events_dev
    env_file: .env
    environment:
      - NODE_ENV=development
      - KAFKA_BROKER=kafka:29093
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EVENTS_DATABASE_URL=postgresql://${POSTGRES_EVENTS_USER}:${POSTGRES_EVENTS_PASSWORD}@postgres:5432/events_db?schema=public
    volumes:
      - ./ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - path: ./apps/events
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  notifications:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notifications
    container_name: devops_notifications_dev
    env_file: .env
    environment:
      - NODE_ENV=development
      - KAFKA_BROKER=kafka:29093
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NOTIFICATIONS_DATABASE_URL=postgresql://${POSTGRES_NOTIFICATIONS_USER}:${POSTGRES_NOTIFICATIONS_PASSWORD}@postgres:5432/notifications_db?schema=public
    volumes:
      - ./ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - path: ./apps/notifications
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  postgres_data:
  kafka_kraft_data:
  redis_data:
