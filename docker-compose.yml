name: events-fsa

# App services connect to remote data services (postgres, kafka, redis) over TLS.
# Place ca.crt in the project root — it is mounted to /app/ca.crt in each container,
# matching the relative ./ca.crt paths in .env.

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29093}
    volumes:
      - ./ca.crt:/app/ca.crt:ro
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/api-gateway
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth
    env_file: .env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29093}
    volumes:
      - ./ca.crt:/app/ca.crt:ro
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/auth
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  events:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: events
    env_file: .env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29093}
    volumes:
      - ./ca.crt:/app/ca.crt:ro
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/events
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  notifications:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notifications
    env_file: .env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29093}
    volumes:
      - ./ca.crt:/app/ca.crt:ro
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/notifications
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

networks:
  backend:
    driver: bridge
