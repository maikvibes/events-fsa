name: events-fsa

# App services connect to data services (postgres, kafka, redis) on the
# docker-internal network created by docker-compose.infra.yml.
# TLS CA cert is bind-mounted read-only from /etc/ssl/events-fsa/ca.crt.

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      # The .env KAFKA_BROKER already points at kafka:29093 (the SSL
      # listener). Override the old PLAINTEXT default explicitly.
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29093}
    volumes:
      - /etc/ssl/events-fsa/ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/api-gateway
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth
    env_file: .env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29093}
    volumes:
      - /etc/ssl/events-fsa/ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/auth
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  events:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: events
    env_file: .env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29093}
    volumes:
      - /etc/ssl/events-fsa/ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/events
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  notifications:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notifications
    env_file: .env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29093}
    volumes:
      - /etc/ssl/events-fsa/ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/notifications
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

networks:
  backend:
    driver: bridge
