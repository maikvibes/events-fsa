name: events-fsa

# App services reach infra (postgres, kafka, redis) via host nginx.
# ca.crt is placed in the project root and mounted to /app/ca.crt in each
# container, matching the relative ./ca.crt paths in .env.
#
# extra_hosts routes public domain names to the Docker host gateway so the
# host nginx (listening on 0.0.0.0) proxies to the containers:
#   db-notif.maik.io.vn:5433  ->  postgres container:5432
#   cache.maik.io.vn:6380     ->  redis container:6379
#   nginx.maik.io.vn:9094     ->  kafka EXTERNAL listener (SASL_SSL)

x-host-routes: &host-routes
  extra_hosts:
    - "nginx.maik.io.vn:host-gateway"
    - "db-notif.maik.io.vn:host-gateway"
    - "cache.maik.io.vn:host-gateway"

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file: .env
    volumes:
      - ./ca.crt:/app/ca.crt:ro
    networks:
      - backend
    <<: *host-routes
    develop:
      watch:
        - path: ./apps/api-gateway
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth
    env_file: .env
    volumes:
      - ./ca.crt:/app/ca.crt:ro
    networks:
      - backend
    <<: *host-routes
    develop:
      watch:
        - path: ./apps/auth
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  events:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: events
    env_file: .env
    volumes:
      - ./ca.crt:/app/ca.crt:ro
    networks:
      - backend
    <<: *host-routes
    develop:
      watch:
        - path: ./apps/events
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  notifications:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notifications
    env_file: .env
    volumes:
      - ./ca.crt:/app/ca.crt:ro
    networks:
      - backend
    <<: *host-routes
    develop:
      watch:
        - path: ./apps/notifications
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

networks:
  backend:
    driver: bridge
