name: events-fsa

# The app services connect directly to the data services (postgres, kafka,
# redis) on the docker-internal network created by docker-compose.infra.yml.
# They use TLS with the same private CA as the host nginx. CA cert is mounted
# read-only from /etc/ssl/events-fsa/ca.crt; per-service TLS knobs are
# driven by .env (see .env.example).

# The infra network the data services live on. Reused so the app can resolve
# `postgres`, `kafka`, `redis`, `zookeeper` by name.
x-infra-network:
  name: events-fsa-infra_backend
  external: true

# The CA cert + Postgres key, owned by the host. The app containers only
# need the CA cert; postgres.crt/postgres.key are mounted into the
# events-fsa-infra-postgres-1 container by docker-compose.infra.yml.
x-ca-mount:
  source: /etc/ssl/events-fsa/ca.crt
  target: /etc/ssl/events-fsa/ca.crt
  read_only: true

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    environment:
      # The .env KAFKA_BROKER already points at kafka:29093 (the SSL
      # listener). Override the old PLAINTEXT default explicitly.
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29093}
    volumes:
      - ca-cert:/etc/ssl/events-fsa/ca.crt:ro
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/api-gateway
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth
    env_file: .env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29093}
    volumes:
      - ca-cert:/etc/ssl/events-fsa/ca.crt:ro
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/auth
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  events:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: events
    env_file: .env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29093}
    volumes:
      - ca-cert:/etc/ssl/events-fsa/ca.crt:ro
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/events
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  notifications:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notifications
    env_file: .env
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:29093}
    volumes:
      - ca-cert:/etc/ssl/events-fsa/ca.crt:ro
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/notifications
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

# Named volume to bind the host's CA cert into the app containers without
# each app needing to know about the host path layout.
volumes:
  ca-cert:
    driver: local
    driver_opts:
      type: none
      device: /etc/ssl/events-fsa/ca.crt
      o: bind,ro

networks:
  backend:
    name: events-fsa-infra_backend
    external: true
