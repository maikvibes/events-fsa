name: events-fsa

# All infra (Kafka, Postgres, Redis) is reached via public DNS.
# ca.crt must be placed in the project root — it is mounted to
# /etc/ssl/events-fsa/ca.crt in each container, matching the absolute paths
# set by generate-secrets.sh in .env.

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file: .env
    volumes:
      - ./ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/api-gateway
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: auth
    env_file: .env
    volumes:
      - ./ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/auth
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  events:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: events
    env_file: .env
    volumes:
      - ./ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/events
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  notifications:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notifications
    env_file: .env
    volumes:
      - ./ca.crt:/etc/ssl/events-fsa/ca.crt:ro
    networks:
      - backend
    develop:
      watch:
        - path: ./apps/notifications
          action: rebuild
        - path: ./libs
          action: rebuild
        - path: ./package.json
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

networks:
  backend:
    driver: bridge
