# Stream block appended to /etc/nginx/nginx.conf by scripts/bootstrap.sh.
# Do not edit by hand - re-run bootstrap to regenerate.

stream {
    log_format stream_main '$remote_addr [$time_local] '
                           'upstream=$upstream_addr '
                           'status=$status '
                           'session_time=$session_time '
                           'bytes_in=$upstream_bytes_received '
                           'bytes_out=$upstream_bytes_sent';

    access_log /var/log/nginx/stream-access.log stream_main;

    include /etc/nginx/events-fsa/conf.d/*.conf;
    include /etc/nginx/events-fsa/stream.conf.d/*.conf;
}
