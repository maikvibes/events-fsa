# Redis 7 - secure defaults. Auth is handled by users.acl.
# Bound to all interfaces but only reachable on the internal docker network;
# no host port is published (only nginx exposes it externally).

bind 0.0.0.0 -::*
protected-mode yes
port 6379
tcp-backlog 511
tcp-keepalive 60
timeout 0

# Run in the foreground so docker can supervise the process.
daemonize no
supervised no
# Docker supervises the process; no pidfile is needed and /var/run/redis is
# not present in the alpine image.

loglevel notice
logfile ""

databases 16

# Durability: AOF with fsync every second.
appendonly yes
appendfilename "appendonly.aof"
appenddirname "appendonlydir"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# Save snapshots off (AOF handles durability).
save ""
rdbchecksum yes
rdbcompression yes

# Memory policy
maxmemory-policy noeviction
maxmemory-samples 5

# Latency monitoring / slow log
latency-monitor-threshold 100
slowlog-log-slower-than 10000
slowlog-max-len 128

# IO threads (Redis 7)
io-threads 1
io-threads-do-reads no

# Auth: handled by the ACL file. Default user is disabled there.
aclfile /usr/local/etc/redis/users.acl

# TLS: redis presents a server cert signed by the events-fsa CA. Clients
# (apps + the host nginx passthrough) verify against the CA mounted at
# /etc/ssl/events-fsa/ca.crt. PLAINTEXT is disabled to keep the wire
# encrypted from every caller.
tls-port 6379
port 0
tls-cert-file /etc/ssl/events-fsa/redis.crt
tls-key-file  /etc/ssl/events-fsa/redis.key
tls-ca-cert-file /etc/ssl/events-fsa/ca.crt
tls-protocols "TLSv1.2 TLSv1.3"
tls-ciphers DEFAULT
tls-ciphersuites TLS_CHACHA20_POLY1305_SHA256:TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256
tls-auth-clients no

# Disable dangerous commands outright, even for the admin ACL user.
# These are belt-and-suspenders on top of ACL.
rename-command CONFIG ""
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command KEYS ""
rename-command DEBUG ""
rename-command SHUTDOWN ""
rename-command BGREWRITEAOF ""
rename-command BGSAVE ""
rename-command LASTSAVE ""
rename-command SAVE ""
rename-command REPLICAOF ""
rename-command SLAVEOF ""
rename-command ACL ""
rename-command MIGRATE ""
rename-command CLUSTER ""
rename-command FAILOVER ""
rename-command RESET ""

# Disable RDB disk-touching commands (already covered by ACL for app user).
rename-command SWAPDB ""
rename-command MOVE ""
rename-command RANDOMKEY ""
rename-command OBJECT ""

# Slow command ceiling
hz 10
dynamic-hz yes
